site_name: Clay — Reference Docs
site_description: Architecture, decisions and runbooks for the Clay trading system
site_url: https://newvogue-labs.github.io/clay/
repo_url: https://github.com/newvogue-labs/clay
repo_name: newvogue-labs/clay
edit_uri: edit/main/docs/
docs_dir: docs

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

plugins:
  - search:
      lang: [en, ru]
  - social:
  - tags:
  - awesome-nav
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
      fallback_to_build_date: true
  - llmstxt-md:
      sections:
        Overview:
          - index.md
          - mission-control/blueprint-v1.md
          - mission-control/approved-stack-v1.md
          - mission-control/tech-stack-v1.md
          - mission-control/project-overview-report-v1.md
          - mission-control/roles-taxonomy.md
          - mission-control/release-gates.md
        "Decisions (ADR)":
          - adr/0*.md
        Runbooks:
          - mission-control/deploy-runbook.md
          - mission-control/runbooks/*.md
        "Architecture Maps":
          - architecture-maps/*.md
        Tooling:
          - tooling/notion-mirror.md
  - mkdocstrings:
      handlers:
        python:
          paths: [backend/src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            members_order: source
            separate_signature: true
            show_if_no_docstring: false
  - glightbox:
      touchNavigation: true
      zoomable: true
      draggable: true
      effect: zoom
      auto_caption: false
  - minify:
      minify_html: true
      cache_safe: true
      htmlmin_opts:
        remove_comments: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc: { permalink: true }
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.tabbed: { alternate_style: true }

exclude_docs: |
  README.md
  adr/README.md
  development/
  architecture/
  ui-references/
  mission-control/index.md
  mission-control/adrs/
  mission-control/build_specs/
  mission-control/implementation_plans/
  mission-control/egress-recon/
  mission-control/session-summary-*.md
  mission-control/handoff-*.md
  mission-control/execution-backlog-v1.md
  mission-control/next-chat-prompt.md
  mission-control/master-planning-review-v1.md
  mission-control/incident-log.md
  mission-control/skills-strategy-v1.md
  mission-control/ev-gate-proof.md
  *deploy5*

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
